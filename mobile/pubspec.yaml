name: driver_ai
description: Driver AI - Intelligent Copilot for Rideshare Drivers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.1.0

  # Network
  dio: ^5.4.0
  retrofit: ^4.0.3

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.9

  # UI
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  lottie: ^3.0.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  glassmorphism_ui: ^0.3.0

  # OCR
  google_mlkit_text_recognition: ^0.11.0

  # Permissions
  permission_handler: ^11.2.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.2.2
  url_launcher: ^6.2.3
  package_info_plus: ^5.0.1

  # Icons
  cupertino_icons: ^1.0.6
  iconsax: ^0.0.8

  # In App Purchase
  in_app_purchase: ^3.1.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
