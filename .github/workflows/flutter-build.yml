name: Build and Release Flutter APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Android Shell
        working-directory: ./mobile
        run: |
          # Backup our custom Kotlin files before flutter create
          cp -r android/app/src/main/kotlin/com/driverai/driver_ai /tmp/custom_kotlin_backup
          
          flutter create --platforms=android --org com.driverai --project-name driver_ai .
          mkdir -p android/app/src/main/res/xml
          cp custom_manifest/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          cp custom_manifest/accessibility_service_config.xml android/app/src/main/res/xml/accessibility_service_config.xml
          
          # Restore our custom Kotlin files (overwriting any default generated by flutter create)
          cp -r /tmp/custom_kotlin_backup/* android/app/src/main/kotlin/com/driverai/driver_ai/

      - name: Patch Android SDK Versions
        working-directory: ./mobile
        run: |
          sed -i 's/minSdkVersion .*/minSdkVersion 23/' android/app/build.gradle
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          sed -i "s/minSdk = .*/minSdk = 23/" android/app/build.gradle
          sed -i "s/compileSdk = .*/compileSdk = 34/" android/app/build.gradle
          sed -i "s/targetSdk = .*/targetSdk = 34/" android/app/build.gradle
          echo "--- build.gradle after patch ---"
          cat android/app/build.gradle

      - name: Get Dependencies
        working-directory: ./mobile
        run: flutter pub get

      - name: Build APK
        working-directory: ./mobile
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: driver-ai-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v1.2.3"
          gh release create "$TAG_NAME" mobile/build/app/outputs/flutter-apk/app-release.apk --title "DriverAI $TAG_NAME" --notes "Auto-generated release" || echo "Release already exists, skipping."
